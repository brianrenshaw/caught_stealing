app = "fantasy-baseball-br"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data_vol"
  destination = "/data"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/fantasy_baseball.db"
  CACHE_DIR = "/data/cache"
  DATA_DIR = "/data"
  HEADLESS = "true"
  CORS_ORIGINS = "https://fantasy-baseball-br.fly.dev,http://localhost:8000,http://127.0.0.1:8000"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/health"
    interval = "30s"
    timeout = "5s"
