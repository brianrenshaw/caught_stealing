<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lankford Legends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="h-full flex items-center justify-center" style="background: #0E1B2E;">
    <div class="w-full max-w-sm mx-auto px-6">
        <div class="text-center mb-8">
            <h1 class="font-['Roboto_Slab'] text-3xl font-bold text-white">
                Lankford Legends
            </h1>
            <span class="block h-0.5 w-16 mx-auto mt-2 rounded" style="background: #C41E3A;"></span>
        </div>

        <form method="post" action="/login" class="rounded-lg p-6" style="background: #162033; border: 1px solid #2A3A52;">
            {% if error %}
            <div class="mb-4 text-sm text-center rounded px-3 py-2" style="background: rgba(196,30,58,0.15); color: #F87171; border: 1px solid rgba(196,30,58,0.3);">
                {{ error }}
            </div>
            {% endif %}

            <label for="password" class="block text-sm font-medium mb-2" style="color: rgba(255,255,255,0.7);">
                Password
            </label>
            <input type="password" name="password" id="password" required autofocus
                   class="w-full rounded px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none mb-4"
                   style="background: #0E1B2E; border: 1px solid #2A3A52;"
                   onfocus="this.style.borderColor='#C41E3A'"
                   onblur="this.style.borderColor='#2A3A52'">

            <button type="submit"
                    class="w-full rounded px-4 py-2 text-sm font-medium text-white transition-colors"
                    style="background: #C41E3A;"
                    onmouseover="this.style.background='#A8182F'"
                    onmouseout="this.style.background='#C41E3A'">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
