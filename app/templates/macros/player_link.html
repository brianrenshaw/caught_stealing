{% macro player_link(player_id, name, team=None, classes="") %}
{% if player_id %}
<a hx-get="/api/player/{{ player_id }}"
   hx-target="#player-modal-content"
   hx-swap="innerHTML"
   class="{{ classes }} cursor-pointer transition-colors player-link"
   style="color: var(--text-primary);">{{ name }}</a>
{% else %}
<span class="{{ classes }}" style="color: var(--text-primary);">{{ name }}</span>
{% endif %}
{% if team %}<span class="text-xs ml-1" style="color: var(--text-muted);">{{ team }}</span>{% endif %}
{% endmacro %}
