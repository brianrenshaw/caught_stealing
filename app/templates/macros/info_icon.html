{# Info icon macros for tooltips #}

{# Small info icon for stat column headers (12×12px) #}
{% macro stat_info(stat_key) %}
<button type="button" class="info-icon" aria-label="Info about {{ stat_key }}"
        onclick="showInfoTooltip(event, '{{ stat_key }}', 'stat')">
  <svg class="w-3 h-3 inline text-gray-500 hover:text-gray-300 transition-colors ml-0.5 -mt-0.5"
       fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
  </svg>
</button>
{% endmacro %}

{# Larger info icon for page/section headings (16×16px) #}
{% macro page_info(page_key) %}
<button type="button" class="info-icon" aria-label="About this section"
        onclick="showInfoTooltip(event, '{{ page_key }}', 'page')">
  <svg class="w-4 h-4 inline text-gray-500 hover:text-blue-400 transition-colors ml-1.5"
       fill="currentColor" viewBox="0 0 20 20">
    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
  </svg>
</button>
{% endmacro %}
