{# Autocomplete dropdown for compare search #}
{% if players %}
<ul class="bg-surface-card border border-bdr-subtle rounded-lg shadow-lg max-h-72 overflow-y-auto">
    {% for p in players %}
    <li class="flex items-center gap-3 px-3 py-2 hover:bg-surface-elevated cursor-pointer border-b border-bdr last:border-b-0"
        onclick="addToDockFromSearch({{ p | tojson }})">
        {% if p.headshot_url %}
        <img src="{{ p.headshot_url }}" alt="" class="w-8 h-8 rounded-full bg-surface-elevated object-cover flex-shrink-0"
             onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 32 32&quot;><rect fill=&quot;%234B5563&quot; width=&quot;32&quot; height=&quot;32&quot; rx=&quot;16&quot;/><text x=&quot;50%&quot; y=&quot;55%&quot; text-anchor=&quot;middle&quot; dominant-baseline=&quot;middle&quot; fill=&quot;%239CA3AF&quot; font-size=&quot;14&quot;>?</text></svg>'">
        {% else %}
        <div class="w-8 h-8 rounded-full bg-surface-elevated flex items-center justify-center flex-shrink-0">
            <span class="text-txt-secondary text-xs">?</span>
        </div>
        {% endif %}
        <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-txt-primary truncate">{{ p.name }}</div>
            <div class="text-xs text-txt-secondary">{{ p.team or 'FA' }} &middot; {{ p.position or '?' }}</div>
        </div>
        <span class="text-xs text-accent-link flex-shrink-0">+ Add</span>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="bg-surface-card border border-bdr-subtle rounded-lg px-3 py-2 text-sm text-txt-muted">
    No players found
</div>
{% endif %}
