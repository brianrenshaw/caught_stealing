<div class="bg-gray-800/90 rounded-lg border border-purple-700/40 p-5" data-ai-panel>
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-purple-300 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
            </svg>
            Weekly Outlook
        </h3>
        <span class="text-[10px] text-gray-500">Source: MLB Official Injury Report, FanGraphs, Statcast</span>
    </div>

    {% if analysis %}
    <div data-ai-content>
        <script type="text/markdown" data-markdown-source>{{ analysis }}</script>
        <div data-markdown-target class="prose prose-invert prose-sm max-w-none text-gray-300 leading-relaxed
                    [&_strong]:text-white [&_h1]:text-lg [&_h1]:text-purple-200 [&_h1]:mt-4 [&_h1]:mb-2
                    [&_h2]:text-base [&_h2]:text-purple-300 [&_h2]:mt-4 [&_h2]:mb-2
                    [&_h3]:text-sm [&_h3]:text-gray-200 [&_h3]:mt-3 [&_h3]:mb-1
                    [&_ul]:my-2 [&_li]:my-0.5 [&_p]:my-2
                    [&_hr]:border-gray-700 [&_hr]:my-4">
        </div>
    </div>
    {% else %}
    <p class="text-gray-500 text-sm">Weekly outlook could not be generated.</p>
    {% endif %}

    <div class="mt-4 pt-3 border-t border-gray-700/50 flex items-center justify-between">
        <span class="text-[10px] text-gray-600">Generated just now</span>
        <div class="flex items-center gap-3">
            <button onclick="copyAsRichText(this)"
                    class="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" />
                    <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z" />
                </svg>
                Copy
            </button>
            <button onclick="emailAnalysis(this, 'Weekly Fantasy Baseball Outlook')"
                    class="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                    <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                </svg>
                Email
            </button>
            <button hx-post="/api/weekly-outlook"
                    hx-target="#weekly-outlook-container"
                    hx-swap="innerHTML"
                    hx-indicator="#outlook-spinner"
                    class="text-xs text-purple-400 hover:text-purple-300 transition-colors">
                Regenerate
            </button>
        </div>
    </div>
</div>
