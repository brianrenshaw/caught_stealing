<!-- User message -->
<div class="flex justify-end mb-3">
    <div class="bg-accent-primary rounded-lg px-3 py-2 max-w-[80%]">
        <p class="text-sm text-txt-primary">{{ user_message }}</p>
    </div>
</div>
<!-- Assistant response -->
<div class="flex justify-start mb-3">
    <div class="bg-surface-elevated rounded-lg px-3 py-2 max-w-[85%]">
        <div class="text-sm text-txt-primary" data-ai-content>
            <script type="text/markdown" data-markdown-source>{{ response }}</script>
            <div data-markdown-target class="prose prose-invert prose-sm max-w-none
                        [&_strong]:text-txt-primary [&_p]:my-1.5 [&_ul]:my-1 [&_li]:my-0.5
                        [&_h1]:text-base [&_h2]:text-sm [&_h3]:text-sm
                        [&_code]:bg-surface-card [&_code]:px-1 [&_code]:rounded
                        [&_pre]:bg-surface-card [&_pre]:p-2 [&_pre]:rounded">
            </div>
        </div>
        {% if tools_used %}
        <p class="text-xs text-txt-muted mt-2 border-t border-bdr-subtle pt-1">
            Used: {{ tools_used | join(', ') }}
        </p>
        {% endif %}
    </div>
</div>
<!-- Update session ID hidden input -->
<input type="hidden" name="session_id" value="{{ session_id }}"
       hx-swap-oob="true" id="chat-session-id">
