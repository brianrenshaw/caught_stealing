<div class="bg-gray-800/80 rounded-lg border border-indigo-700/50 p-5">
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-indigo-300">AI Roster Analysis</h3>
        <span class="text-[10px] text-gray-500">Source: MLB Official Injury Report</span>
    </div>

    {% if analysis %}
    <div class="prose prose-invert prose-sm max-w-none text-gray-300 leading-relaxed
                [&_strong]:text-white [&_h1]:text-lg [&_h2]:text-base [&_h3]:text-sm
                [&_ul]:my-2 [&_li]:my-0.5 [&_p]:my-2">
        {{ analysis | replace('\n', '<br>') | safe }}
    </div>
    {% else %}
    <p class="text-gray-500 text-sm">Analysis could not be generated.</p>
    {% endif %}

    <div class="mt-3 pt-3 border-t border-gray-700/50 flex items-center justify-between">
        <span class="text-[10px] text-gray-600">Generated just now</span>
        <button hx-post="/waivers/analyze"
                hx-target="#waiver-analysis-container"
                hx-swap="innerHTML"
                hx-include="#period-select"
                hx-indicator="#analyze-spinner"
                class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">
            Re-analyze
        </button>
    </div>
</div>
